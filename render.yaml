services:
  - type: web
    name: reservation-api
    runtime: node
    repo: https://github.com/votre-username/reservation
    plan: free
    region: frankfurt
    buildCommand: cd client && npm install && npm run render-build && cd ../server && npm install && npm run render-build
    startCommand: cd server && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: reservation-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: reservation-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: live
      - key: PLATFORM_PAYPAL_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://reservation-api.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://reservation-api.onrender.com/api/auth/google/callback
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: reservation-db
    plan: free
    region: frankfurt

redis:
  - name: reservation-redis
    plan: free
    region: frankfurt
